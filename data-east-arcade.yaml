esphome:
  name: data-east-arcade
  friendly_name: Data East Arcade

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "1234567890abcdef"

ota:
  - platform: esphome
    password: "1234567890abcdef"

wifi:
  ssid: "1234567890abcdef"
  password: "1234567890abcdef"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Data-East-Arcade"
    password: "1234567890abcdef"

captive_portal:

globals:
  - id: Day_Of_Week
    type: int
  - id: Todays_Game_Int
    type: int
    initial_value: "999"

script:
  - id: Update_Todays_Game_Int
    then:
      - globals.set:
          id: Todays_Game_Int
          value: !lambda |-
            if (id(Day_Of_Week) == 1 ) {
              return 0;
            } 
            else if (id(Day_Of_Week) == 2) {
              return 0;
            }
            else if (id(Day_Of_Week) == 3) {
              return 2;  
            }
            else if (id(Day_Of_Week) == 4) {
              return 1;  
            }
            else if (id(Day_Of_Week) == 5) {
              return 2;  
            }
            else if (id(Day_Of_Week) == 6) {
              return 0;  
            }
            else if (id(Day_Of_Week) == 7) {
              return 5;  
            }
            else {
              return 0;
            }

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - globals.set:
            id: Day_Of_Week
            value: !lambda return id(homeassistant_time).now().day_of_week;
        - script.execute: Update_Todays_Game_Int
        - component.update: Todays_Game
        - logger.log:
            format: "Day of the week is: %d"
            args: ["id(Day_Of_Week)"]
        - logger.log:
            format: "Todays Game is: %d"
            args: ["id(Todays_Game_Int)"]
    on_time:
      - seconds: 1
        minutes: 0
        hours: 0
        then:
          - globals.set:
              id: Day_Of_Week
              value: !lambda return id(homeassistant_time).now().day_of_week;
          - script.execute: Update_Todays_Game_Int
          - component.update: Todays_Game
          - logger.log:
              format: "Day of the week is: %d"
              args: ["id(Day_Of_Week)"]
          - logger.log:
              format: "Todays Game is: %d"
              args: ["id(Todays_Game_Int)"]

text_sensor:
  - platform: template
    name: "Today's Game"
    id: Todays_Game
    icon: mdi:nintendo-game-boy
    lambda: |-
      if (id(Todays_Game_Int) == 0 ) {
        return {"BurgerTime"};
      } 
      else if (id(Todays_Game_Int) == 1) {
        return {"Bad Dudes"};
      }
      else if (id(Todays_Game_Int) == 2) {
        return {"BreakThru"};  
      }
      else if (id(Todays_Game_Int) == 5) {
        return {"Side Pocket"};  
      }
      else {
        return esphome::str_sprintf("Unknown Game: %d", id(Todays_Game_Int));
      }

button:
  - platform: output
    name: "Start Button"
    icon: mdi:gamepad-circle
    output: Start
    duration: 500ms

  - platform: output
    name: "Down Button"
    icon: mdi:gamepad-down
    output: Down
    duration: 500ms

  - platform: template
    name: "Start Today's Game"
    icon: mdi:gamepad-square-outline
    on_press:
      - repeat:
          count: !lambda return id(Todays_Game_Int);
          then:
            - output.turn_on: Down
            - delay: 100ms
            - output.turn_off: Down
            - delay: 100ms
      - output.turn_on: Start
      - delay: 100ms
      - output.turn_off: Start

output:
  - platform: gpio
    pin:
      number: 0
    id: "Start"

  - platform: gpio
    pin:
      number: 2
      ignore_strapping_warning: true
    id: "Down"
